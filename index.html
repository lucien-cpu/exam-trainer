<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>National Exam Trainer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: #e6e6e6;
}

header {
  text-align: center;
  padding: 15px;
  background: #11131a;
  border-bottom: 1px solid #2a2d3a;
}

h1 { margin: 0; font-size: 20px; }
.small { font-size: 12px; opacity: 0.7; }

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #151823;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #2a2d3a;
}

.category {
  color: #ffcc00;
  font-weight: bold;
  margin-bottom: 10px;
}

.question {
  font-size: 18px;
  margin-bottom: 15px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.start { background: #ffcc00; }
.next { background: #2ecc71; }
.fail { background: #e74c3c; }
.pass { background: #3498db; }

.bar {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 10px;
  margin-top: 10px;
}

.fill {
  height: 10px;
  background: #ffcc00;
  width: 0%;
  border-radius: 10px;
}

.result {
  text-align: center;
  font-size: 18px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
  .container {
    padding: 10px;
  }

  .card {
    padding: 15px;
  }

  .question {
    font-size: 16px;
  }

  button {
    width: 100%;
    margin: 6px 0;
  }

  header h1 {
    font-size: 16px;
  }
}

button:active {
  transform: scale(0.98);
}
</style>
</head>

<body>

<header>
  <h1>🎓 ეროვნული გამოცდების ტრენერი</h1>
  <div class="small">AI Weakness Engine + Mock Exam Mode</div>
</header>

<div class="container">

<button class="start" onclick="startExam()">გამოცდის დაწყება</button>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="card" id="card" style="display:none;">
  <div class="category" id="cat"></div>
  <div class="question" id="q"></div>

  <button class="pass" onclick="mark(true)">ვიცოდი</button>
  <button class="fail" onclick="mark(false)">არ ვიცოდი</button>
  <button class="next" onclick="next()">შემდეგი</button>

  <div id="answer" style="margin-top:10px;color:#aaa;"></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

/* ================= QUESTION BANK ================= */
const data = [
{cat:"პროგრესია", q:"იპოვე n-ე წევრი.", ans:"aₙ = a₁ + (n−1)d"},
{cat:"პროგრესია", q:"ჯამი.", ans:"Sₙ = n/2(a₁ + aₙ)"},
{cat:"ალგებრა", q:"კვადრატული განტოლება.", ans:"x = (-b ± √(b²-4ac)) / (2a)"},
{cat:"ალგებრა", q:"a = 1 შემთხვევა.", ans:"x = (-b ± √(b² - 4c))/2"},
{cat:"გეომეტრია", q:"მანძილი ორ წერტილს შორის.", ans:"√((x₂-x₁)²+(y₂-y₁)²)"},
{cat:"გეომეტრია", q:"წრის ფართობი.", ans:"πr²"},
{cat:"ტრიგონომეტრია", q:"sin²x + cos²x.", ans:"sin²x + cos²x = 1"},
{cat:"ალბათობა", q:"P(A).", ans:"n(A)/n(Ω)"},
{cat:"კომბინატორიკა", q:"C(n,k).", ans:"n!/(k!(n-k)!)"},
{cat:"ფუნქციები", q:"y = kx + b.", ans:"y = kx + b"},
{cat:"ლოგარითმები", q:"log definition.", ans:"log_a(x)=y ⇔ a^y=x"}
];

/* ================= ENGINE ================= */
let stats = {};
let exam = [];
let index = 0;
let score = 0;
let answered = false; // 🔒 anti double-click fix

function pickQuestion() {
  let weighted = [];

  for (let q of data) {
    let w = stats[q.cat] ? 1 : 3;
    for (let i = 0; i < w; i++) weighted.push(q);
  }

  return weighted[Math.floor(Math.random() * weighted.length)];
}

/* ================= FLOW ================= */
function startExam(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};

  for (let i = 0; i < 20; i++) {
    exam.push(pickQuestion());
  }

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";
  show();
}

function show(){
  let q = exam[index];

  answered = false; // reset lock per question

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;
  document.getElementById("answer").innerText = "";

  updateBar();
}

function mark(known){

  if (answered) return; // 🔒 prevents spam clicks
  answered = true;

  let q = exam[index];

  if (!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  if (known) {
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;
  }

  document.getElementById("answer").innerHTML =
    "<b>პასუხი:</b> " + q.ans;
}

function next(){
  index++;

  if (index >= exam.length) {
    finish();
    return;
  }

  show();
}

function finish(){
  document.getElementById("card").style.display = "none";

  let weak = Object.entries(stats)
    .sort((a,b) => b[1].bad - a[1].bad)
    .slice(0,3)
    .map(x => x[0]);

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20<br>" +
    "⚠️ სუსტი თემები: " + (weak.length ? weak.join(", ") : "none");
}

function updateBar(){
  let p = (index / exam.length) * 100;
  document.getElementById("fill").style.width = p + "%";
}

</script>

</body>
</html>
