<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>National Exam Trainer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: #e6e6e6;
}

header {
  text-align: center;
  padding: 15px;
  background: #11131a;
  border-bottom: 1px solid #2a2d3a;
}

h1 { margin: 0; font-size: 20px; }
.small { font-size: 12px; opacity: 0.7; }

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #151823;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #2a2d3a;
}

.category {
  color: #ffcc00;
  font-weight: bold;
  margin-bottom: 10px;
}

.question {
  font-size: 18px;
  margin-bottom: 15px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.start { background: #ffcc00; }
.next { background: #2ecc71; }
.fail { background: #e74c3c; }
.pass { background: #3498db; }

.bar {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 10px;
  margin-top: 10px;
}

.fill {
  height: 10px;
  background: #ffcc00;
  width: 0%;
  border-radius: 10px;
}

.result {
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
  <h1>🎓 ეროვნული გამოცდების ტრენერი</h1>
  <div class="small">AI Weakness Engine + Mock Exam Mode</div>
</header>

<div class="container">

<button class="start" onclick="startExam()">გამოცდის დაწყება</button>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="card" id="card" style="display:none;">
  <div class="category" id="cat"></div>
  <div class="question" id="q"></div>

  <button class="pass" onclick="mark(true)">ვიცოდი</button>
  <button class="fail" onclick="mark(false)">არ ვიცოდი</button>
  <button class="next" onclick="next()">შემდეგი</button>

  <div id="answer" style="margin-top:10px;color:#aaa;"></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

/* ================= QUESTION BANK ================= */
const data = [

/* ================= PROGRESSION ================= */
{cat:"პროგრესია", q:"იპოვე n-ე წევრი.", ans:"aₙ = a₁ + (n−1)d"},
{cat:"პროგრესია", q:"არითმეტიკული ჯამი.", ans:"Sₙ = n/2 (a₁ + aₙ)"},
{cat:"პროგრესია", q:"გეომეტრიული n-ე წევრი.", ans:"aₙ = a₁·r^(n−1)"},
{cat:"პროგრესია", q:"გეომეტრიული ჯამი.", ans:"Sₙ = a₁(1−rⁿ)/(1−r)"},

/* ================= QUADRATIC (IMPORTANT CASES) ================= */
{
cat:"ალგებრა",
q:"ამოხსენი კვადრატული განტოლება (a = 1).",
ans:"x² + bx + c = 0 ⇒ x = (-b ± √(b² - 4c)) / 2"
},
{
cat:"ალგებრა",
q:"ამოხსენი კვადრატული განტოლება (a ≠ 1).",
ans:"ax² + bx + c = 0 ⇒ x = (-b ± √(b² - 4ac)) / (2a)"
},
{
cat:"ალგებრა",
q:"ვიეტის თეორემა.",
ans:"x₁ + x₂ = -b/a, x₁x₂ = c/a"
},
{
cat:"ალგებრა",
q:"სხვაობის კვადრატი.",
ans:"a² - b² = (a-b)(a+b)"
},
{
cat:"ალგებრა",
q:"სრული კვადრატი.",
ans:"(a ± b)² = a² ± 2ab + b²"
},

/* ================= GEOMETRY ================= */
{
cat:"გეომეტრია",
q:"მანძილი ორ წერტილს შორის.",
ans:"d = √((x₂-x₁)² + (y₂-y₁)²)"
},
{
cat:"გეომეტრია",
q:"შუა წერტილი.",
ans:"M = ((x₁+x₂)/2, (y₁+y₂)/2)"
},
{
cat:"გეომეტრია",
q:"სწორის დახრილობა.",
ans:"k = (y₂-y₁)/(x₂-x₁)"
},
{
cat:"გეომეტრია",
q:"სწორის განტოლება.",
ans:"y = kx + b"
},
{
cat:"გეომეტრია",
q:"წრის განტოლება.",
ans:"(x-a)² + (y-b)² = r²"
},
{
cat:"გეომეტრია",
q:"წრის ფართობი.",
ans:"S = πr²"
},
{
cat:"გეომეტრია",
q:"წრის სიგრძე.",
ans:"C = 2πr"
},
{
cat:"გეომეტრია",
q:"სამკუთხედის ფართობი.",
ans:"S = 1/2 ab sinC"
},
{
cat:"გეომეტრია",
q:"პითაგორას თეორემა.",
ans:"a² + b² = c²"
},
{
cat:"გეომეტრია",
q:"კოსინუსების თეორემა.",
ans:"c² = a² + b² − 2ab cosC"
},
{
cat:"გეომეტრია",
q:"მსგავსი სამკუთხედები.",
ans:"a₁/a₂ = b₁/b₂ = c₁/c₂"
},
{
cat:"გეომეტრია",
q:"ტრაპეციის ფართობი.",
ans:"S = (a+b)/2 · h"
},

/* ================= TRIGONOMETRY ================= */
{
cat:"ტრიგონომეტრია",
q:"ძირითადი იდენტობა.",
ans:"sin²x + cos²x = 1"
},
{
cat:"ტრიგონომეტრია",
q:"ტანგენსი.",
ans:"tan x = sin x / cos x"
},
{
cat:"ტრიგონომეტრია",
q:"სინუსების თეორემა.",
ans:"a/sinA = b/sinB = c/sinC"
},
{
cat:"ტრიგონომეტრია",
q:"ორმაგი კუთხე (sin).",
ans:"sin2x = 2sinxcosx"
},
{
cat:"ტრიგონომეტრია",
q:"ორმაგი კუთხე (cos).",
ans:"cos2x = cos²x - sin²x"
},

/* ================= PROBABILITY ================= */
{
cat:"ალბათობა",
q:"ძირითადი ალბათობა.",
ans:"P(A) = n(A)/n(Ω)"
},
{
cat:"ალბათობა",
q:"დამოუკიდებელი მოვლენები.",
ans:"P(A∩B) = P(A)·P(B)"
},

/* ================= COMBINATORICS ================= */
{
cat:"კომბინატორიკა",
q:"კომბინაციები.",
ans:"C(n,k) = n!/(k!(n-k)!)"
},
{
cat:"კომბინატორიკა",
q:"პერმუტაცია.",
ans:"P(n) = n!"
},
{
cat:"კომბინატორიკა",
q:"განლაგება.",
ans:"A(n,k) = n!/(n-k)!"
},

/* ================= FUNCTIONS ================= */
{
cat:"ფუნქციები",
q:"წრფივი ფუნქცია.",
ans:"y = kx + b"
},
{
cat:"ფუნქციები",
q:"კვადრატული ფუნქცია.",
ans:"y = ax² + bx + c"
},
{
cat:"ფუნქციები",
q:"პარაბოლის წვერო.",
ans:"x = -b/(2a)"
},

/* ================= EXPONENTIAL ================= */
{
cat:"ექსპონენციები",
q:"ექსპონენციალური მოდელი.",
ans:"A = A₀·a^t"
},

/* ================= LOGARITHMS ================= */
{
cat:"ლოგარითმები",
q:"ლოგარითმის განმარტება.",
ans:"log_a(x) = y ⇔ a^y = x"
},
{
cat:"ლოგარითმები",
q:"ლოგის თვისებები.",
ans:"log(ab)=log a + log b"
},
{
cat:"ლოგარითმები",
q:"ლოგის გაყოფა.",
ans:"log(a/b)=log a - log b"
},

/* ================= COORDINATE GEOMETRY ================= */
{
cat:"გეომეტრია",
q:"სწორის განტოლება.",
ans:"y = kx + b"
},
{
cat:"გეომეტრია",
q:"დახრილობა.",
ans:"k = (y₂-y₁)/(x₂-x₁)"
},
{
cat:"გეომეტრია",
q:"წრის ცენტრი და რადიუსი.",
ans:"(x-a)² + (y-b)² = r²"
}
];


/* ================= WEAKNESS ENGINE ================= */
let stats = {};
let exam = [];
let index = 0;
let score = 0;

function pickQuestion() {
  let weighted = [];

  for (let q of data) {
    let w = stats[q.cat] ? 1 : 3;
    for (let i = 0; i < w; i++) weighted.push(q);
  }

  return weighted[Math.floor(Math.random() * weighted.length)];
}

/* ================= EXAM FLOW ================= */
function startExam(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};

  for (let i = 0; i < 20; i++) {
    exam.push(pickQuestion());
  }

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";
  show();
}

function show(){
  let q = exam[index];

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;
  document.getElementById("answer").innerText = "";

  updateBar();
}

function mark(known){
  let q = exam[index];

  if (!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  if (known) {
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;
  }

  document.getElementById("answer").innerHTML =
    "<b>პასუხი:</b> " + q.ans;
}

function next(){
  index++;

  if (index >= exam.length) {
    finish();
    return;
  }

  show();
}

function finish(){
  document.getElementById("card").style.display = "none";

  let weak = Object.entries(stats)
    .sort((a,b) => b[1].bad - a[1].bad)
    .slice(0,3)
    .map(x => x[0]);

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20<br>" +
    "⚠️ სუსტი თემები: " + (weak.length ? weak.join(", ") : "none");
}

function updateBar(){
  let p = (index / exam.length) * 100;
  document.getElementById("fill").style.width = p + "%";
}

</script>

</body>
</html>
