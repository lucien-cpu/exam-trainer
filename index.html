<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Exam Trainer</title>

<style>
:root {
  --bg: #0b0c10;
  --card: rgba(21, 24, 35, 0.85);
  --border: rgba(255,255,255,0.08);
  --text: #e6e6e6;
  --muted: #a0a0a0;
  --accent: #ffcc00;
  --good: #2ecc71;
  --bad: #e74c3c;
  --blue: #3498db;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #141622, var(--bg));
  color: var(--text);
}

header {
  text-align: center;
  padding: 18px;
  border-bottom: 1px solid var(--border);
}

h1 { margin: 0; font-size: 20px; }
.small { font-size: 12px; color: var(--muted); }

.container {
  max-width: 800px;
  margin: auto;
  padding: 18px;
}

/* BUTTONS */
button {
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-weight: 600;
  cursor: pointer;
}

.start { background: var(--accent); width: 100%; margin-bottom: 12px; }

.pass { background: var(--good); color: white; flex: 1; }
.fail { background: var(--bad); color: white; flex: 1; }
.next { background: var(--blue); color: white; flex: 1; }

/* PROGRESS */
.bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 16px;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), #ffd84d);
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  backdrop-filter: blur(12px);
}

.category {
  color: var(--accent);
  font-size: 12px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.question {
  font-size: 18px;
  margin-bottom: 14px;
}

.btn-row {
  display: flex;
  gap: 10px;
}

#answer {
  margin-top: 12px;
  color: var(--muted);
}

/* GRAPH */
.graph-box {
  margin-top: 25px;
  padding: 15px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  border: 1px solid var(--border);
}

canvas {
  width: 100%;
  height: 260px;
}

/* MOBILE */
@media (max-width: 600px) {
  .btn-row { flex-direction: column; }
}
</style>
</head>

<body>

<header>
  <h1>🎓 ეროვნული გამოცდების ტრენერი</h1>
  <div class="small">Analytics Mode Enabled</div>
</header>

<div class="container">

<button class="start" onclick="startExam()">გამოცდის დაწყება</button>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="card" id="card" style="display:none;">
  <div class="category" id="cat"></div>
  <div class="question" id="q"></div>

  <div class="btn-row">
    <button class="pass" onclick="mark(true)">ვიცოდი</button>
    <button class="fail" onclick="mark(false)">არ ვიცოდი</button>
    <button class="next" onclick="next()">შემდეგი</button>
  </div>

  <div id="answer"></div>
</div>

<div class="result" id="result"></div>

<div class="graph-box" id="graphBox" style="display:none;">
  <h3>📊 შედეგების ანალიტიკა</h3>
  <canvas id="graph"></canvas>
</div>

</div>

<script>

const data = [
{cat:"პროგრესია", q:"n-ე წევრი?", ans:"aₙ = a₁ + (n−1)d"},
{cat:"ალგებრა", q:"კვადრატული?", ans:"x = (-b ± √(b²-4ac))/(2a)"},
{cat:"გეომეტრია", q:"მანძილი?", ans:"√((x₂-x₁)²+(y₂-y₁)²)"},
{cat:"ტრიგონომეტრია", q:"sin²x+cos²x?", ans:"1"},
{cat:"ალბათობა", q:"P(A)?", ans:"n(A)/n(Ω)"}
];

let stats = {};
let exam = [];
let index = 0;
let score = 0;
let answered = false;

/* PICK */
function pickQuestion(){
  let pool = [];
  for (let q of data) {
    let w = stats[q.cat] ? 1 : 3;
    for (let i=0;i<w;i++) pool.push(q);
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

/* START */
function startExam(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};

  for (let i=0;i<20;i++) exam.push(pickQuestion());

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";
  document.getElementById("graphBox").style.display = "none";

  show();
}

/* SHOW */
function show(){
  let q = exam[index];
  answered = false;

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;
  document.getElementById("answer").innerText = "";

  updateBar();
}

/* MARK */
function mark(known){
  if (answered) return;
  answered = true;

  let q = exam[index];

  if (!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  if (known) {
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;
  }

  document.getElementById("answer").innerText = "📌 " + q.ans;
}

/* NEXT */
function next(){
  index++;
  if (index >= exam.length) return finish();
  show();
}

/* FINISH */
function finish(){
  document.getElementById("card").style.display = "none";

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20";

  drawGraph();
}

/* BAR */
function updateBar(){
  let p = (index/exam.length)*100;
  document.getElementById("fill").style.width = p + "%";
}

/* ================= GRAPH ================= */
function drawGraph(){
  document.getElementById("graphBox").style.display = "block";

  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = 260;

  const categories = Object.keys(stats);
  const barWidth = canvas.width / (categories.length * 2);

  let max = 1;
  categories.forEach(c=>{
    max = Math.max(max, stats[c].ok + stats[c].bad);
  });

  categories.forEach((cat, i)=>{
    let x = i * barWidth * 2 + 20;

    let okH = (stats[cat].ok / max) * 200;
    let badH = (stats[cat].bad / max) * 200;

    // correct
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(x, 220 - okH, barWidth, okH);

    // wrong
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(x + barWidth, 220 - badH, barWidth, badH);

    ctx.fillStyle = "#fff";
    ctx.font = "10px Arial";
    ctx.fillText(cat, x, 240);
  });
}

</script>

</body>
</html>
