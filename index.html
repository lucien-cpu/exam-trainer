<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Exam Trainer</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b0c10;
  color: #e6e6e6;
}

header {
  text-align: center;
  padding: 16px;
  border-bottom: 1px solid #2a2d3a;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 16px;
}

.card {
  background: #151823;
  border: 1px solid #2a2d3a;
  border-radius: 14px;
  padding: 18px;
  margin-top: 15px;
}

.category {
  color: #ffcc00;
  font-size: 12px;
  margin-bottom: 10px;
}

.question {
  font-size: 18px;
  margin-bottom: 12px;
}

.timer {
  color: #ffcc00;
  margin-bottom: 10px;
}

/* buttons */
button {
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-weight: 600;
  cursor: pointer;
}

.start { background: #ffcc00; width: 100%; }

.pass { background: #2ecc71; flex: 1; }
.fail { background: #e74c3c; flex: 1; }

.next {
  background: #3498db;
  width: 100%;
  margin-top: 10px;
  opacity: 0.5;
  pointer-events: none;
}

.btn-row {
  display: flex;
  gap: 10px;
}

.selected {
  outline: 2px solid white;
  transform: scale(1.03);
}

#answer {
  margin-top: 10px;
  color: #aaa;
}

@media(max-width:600px){
  .btn-row { flex-direction: column; }
}
</style>
</head>

<body>

<header>
  <h1>🎓 ეროვნული გამოცდების ტრენერი</h1>
</header>

<div class="container">

<button class="start" onclick="startExam()">გამოცდის დაწყება</button>

<div class="card" id="card" style="display:none;">

  <div class="timer" id="timer">⏱ 60</div>

  <div class="category" id="cat"></div>
  <div class="question" id="q"></div>

  <div class="btn-row">
    <button class="pass" id="yesBtn" onclick="selectAnswer(true)">ვიცოდი</button>
    <button class="fail" id="noBtn" onclick="selectAnswer(false)">არ ვიცოდი</button>
  </div>

  <button class="next" id="nextBtn" onclick="next()">შემდეგი</button>

  <div id="answer"></div>
</div>

<div id="result"></div>

</div>

<script>

/* ================= SAFE GUARD ================= */
window.onerror = function(msg, src, line) {
  console.log("JS ERROR:", msg, "line:", line);
};

/* ================= DATA ================= */
const data = [
{cat:"პროგრესია", q:"n-ე წევრი?", ans:"aₙ = a₁ + (n−1)d"},
{cat:"ალგებრა", q:"კვადრატული?", ans:"x = (-b ± √(b²-4ac))/(2a)"},
{cat:"გეომეტრია", q:"მანძილი?", ans:"√((x₂-x₁)²+(y₂-y₁)²)"},
{cat:"ტრიგონომეტრია", q:"sin²x+cos²x?", ans:"1"},
{cat:"ალბათობა", q:"P(A)?", ans:"n(A)/n(Ω)"}
];

let stats = {};
let exam = [];
let index = 0;
let score = 0;

let selected = null;
let locked = false;
let time = 60;
let timer;

/* ================= PICK ================= */
function pick(){
  return data[Math.floor(Math.random()*data.length)];
}

/* ================= START ================= */
window.startExam = function(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};

  for(let i=0;i<20;i++) exam.push(pick());

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";

  show();
};

/* ================= SHOW ================= */
function show(){
  let q = exam[index];

  selected = null;
  locked = false;
  time = 60;

  document.getElementById("answer").innerHTML = "";
  document.getElementById("nextBtn").style.opacity = 0.5;
  document.getElementById("nextBtn").style.pointerEvents = "none";

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;

  resetButtons();
  startTimer();
}

/* ================= TIMER ================= */
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    time--;
    const t = document.getElementById("timer");
    if(t) t.innerText = "⏱ " + time;

    if(time <= 0){
      clearInterval(timer);
      lock(false);
    }
  },1000);
}

/* ================= SELECT ================= */
window.selectAnswer = function(val){
  if(locked) return;

  selected = val;

  document.getElementById("yesBtn").classList.remove("selected");
  document.getElementById("noBtn").classList.remove("selected");

  if(val){
    document.getElementById("yesBtn").classList.add("selected");
  } else {
    document.getElementById("noBtn").classList.add("selected");
  }

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
};

/* ================= LOCK ================= */
function lock(force){
  if(locked) return;

  locked = true;
  clearInterval(timer);

  let q = exam[index];

  if(!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  let val = selected;

  if(force !== undefined) val = force;

  if(val){
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;
  }

  document.getElementById("answer").innerHTML =
    "📌 " + q.ans;

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
}

/* ================= NEXT ================= */
window.next = function(){

  if(!locked){
    lock(selected ?? false);
  }

  index++;

  if(index >= exam.length){
    finish();
    return;
  }

  show();
};

/* ================= RESET ================= */
function resetButtons(){
  const y = document.getElementById("yesBtn");
  const n = document.getElementById("noBtn");

  if(y) y.classList.remove("selected");
  if(n) n.classList.remove("selected");
}

/* ================= FINISH ================= */
function finish(){
  clearInterval(timer);

  document.getElementById("card").style.display = "none";

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20";
}

</script>

</body>
</html>
