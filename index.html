<script>

const data = [
{cat:"პროგრესია", q:"n-ე წევრი?", ans:"aₙ = a₁ + (n−1)d"},
{cat:"ალგებრა", q:"კვადრატული?", ans:"x = (-b ± √(b²-4ac))/(2a)"},
{cat:"გეომეტრია", q:"მანძილი?", ans:"√((x₂-x₁)²+(y₂-y₁)²)"},
{cat:"ტრიგონომეტრია", q:"sin²x+cos²x?", ans:"1"},
{cat:"ალბათობა", q:"P(A)?", ans:"n(A)/n(Ω)"}
];

let stats = {};
let exam = [];
let index = 0;
let score = 0;

let selected = null;
let locked = false;
let time = 60;
let timerInterval;

/* PICK */
function pickQuestion(){
  let pool = [];
  for (let q of data) {
    let w = stats[q.cat] ? 1 : 3;
    for (let i=0;i<w;i++) pool.push(q);
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

/* START */
window.startExam = function(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};

  for (let i=0;i<20;i++) exam.push(pickQuestion());

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";

  show();
};

/* SHOW QUESTION */
function show(){
  let q = exam[index];

  selected = null;
  locked = false;
  time = 60;

  document.getElementById("answer").innerHTML = "";

  document.getElementById("nextBtn").style.opacity = 0.5;
  document.getElementById("nextBtn").style.pointerEvents = "none";

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;

  resetButtons();
  startTimer();
}

/* TIMER */
function startTimer(){
  clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱ " + time;

    if (time <= 0) {
      clearInterval(timerInterval);
      lockAnswer(false); // auto-fail
    }
  }, 1000);
}

/* SELECT ANSWER */
window.selectAnswer = function(val){
  if (locked) return;

  selected = val;

  document.getElementById("yesBtn").classList.remove("selected");
  document.getElementById("noBtn").classList.remove("selected");

  if (val) document.getElementById("yesBtn").classList.add("selected");
  else document.getElementById("noBtn").classList.add("selected");

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
};

/* LOCK ANSWER */
function lockAnswer(forceVal){
  if (locked) return;

  locked = true;
  clearInterval(timerInterval);

  let q = exam[index];

  if (!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  let finalAnswer = selected;

  if (forceVal !== undefined) {
    finalAnswer = forceVal;
  }

  if (finalAnswer === true) {
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;
  }

  document.getElementById("answer").innerHTML =
    "📌 " + q.ans;

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
}

/* NEXT QUESTION (FIXED) */
window.next = function(){

  // 🔥 IMPORTANT FIX:
  // allow proceeding if locked OR time ended
  if (!locked) {
    lockAnswer(selected ?? false);
  }

  index++;

  if (index >= exam.length) {
    finish();
    return;
  }

  show();
};

/* RESET UI */
function resetButtons(){
  document.getElementById("yesBtn").classList.remove("selected");
  document.getElementById("noBtn").classList.remove("selected");
}

/* FINISH */
function finish(){
  clearInterval(timerInterval);

  document.getElementById("card").style.display = "none";

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20";
}

</script>
