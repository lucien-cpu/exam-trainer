<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Exam Trainer</title>

<style>
:root {
  --bg: #0b0c10;
  --card: rgba(21, 24, 35, 0.85);
  --border: rgba(255,255,255,0.08);
  --text: #e6e6e6;
  --muted: #a0a0a0;
  --accent: #ffcc00;
  --good: #2ecc71;
  --bad: #e74c3c;
  --blue: #3498db;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #141622, var(--bg));
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

h1 { margin: 0; font-size: 20px; }
.small { font-size: 12px; color: var(--muted); }

/* CONTAINER */
.container {
  max-width: 820px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  margin-top: 16px;
  backdrop-filter: blur(14px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* TOP INFO */
.category {
  color: var(--accent);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.timer {
  float: right;
  color: var(--accent);
  font-weight: 600;
}

/* QUESTION */
.question {
  font-size: 20px;
  margin-top: 10px;
  margin-bottom: 18px;
  line-height: 1.4;
}

/* BUTTONS */
button {
  border: none;
  border-radius: 12px;
  padding: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
}

button:active { transform: scale(0.97); }

.start {
  background: var(--accent);
  width: 100%;
  margin-bottom: 10px;
}

.btn-row {
  display: flex;
  gap: 10px;
}

.pass { background: var(--good); color: white; flex: 1; }
.fail { background: var(--bad); color: white; flex: 1; }

.next {
  margin-top: 10px;
  width: 100%;
  background: var(--blue);
  color: white;
  opacity: 0.5;
  pointer-events: none;
}

.selected {
  outline: 2px solid rgba(255,255,255,0.3);
  transform: scale(1.03);
}

/* RESULT */
.result {
  margin-top: 20px;
  font-size: 18px;
}

/* REVIEW */
.review {
  margin-top: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 14px;
}

.review h3 {
  margin-top: 0;
  color: var(--accent);
}

.bad-item {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.bad-item:last-child {
  border-bottom: none;
}

/* MOBILE */
@media(max-width:600px){
  .btn-row { flex-direction: column; }
  .timer { float: none; display: block; margin-top: 5px; }
}
</style>
</head>

<body>

<header>
  <h1>🎓 ეროვნული გამოცდების ტრენერი</h1>
  <div class="small">Professional Exam Mode</div>
</header>

<div class="container">

<button class="start" onclick="startExam()">გამოცდის დაწყება</button>

<div class="card" id="card" style="display:none;">

  <div class="category" id="cat"></div>
  <div class="timer" id="timer">⏱ 60</div>

  <div class="question" id="q"></div>

  <div class="btn-row">
    <button class="pass" id="yesBtn" onclick="selectAnswer(true)">ვიცოდი</button>
    <button class="fail" id="noBtn" onclick="selectAnswer(false)">არ ვიცოდი</button>
  </div>

  <button class="next" id="nextBtn" onclick="next()">შემდეგი</button>

  <div id="answer" style="margin-top:10px;color:var(--muted);"></div>
</div>

<div class="result" id="result"></div>

<div id="reviewBox" class="review" style="display:none;">
  <h3>📋 შეცდომები (Review)</h3>
  <div id="reviewList"></div>
</div>

</div>

<script>

const data = [
{cat:"პროგრესია", q:"n-ე წევრი?", ans:"aₙ = a₁ + (n−1)d"},
{cat:"ალგებრა", q:"კვადრატული?", ans:"x = (-b ± √(b²-4ac))/(2a)"},
{cat:"გეომეტრია", q:"მანძილი?", ans:"√((x₂-x₁)²+(y₂-y₁)²)"},
{cat:"ტრიგონომეტრია", q:"sin²x+cos²x?", ans:"1"},
{cat:"ალბათობა", q:"P(A)?", ans:"n(A)/n(Ω)"}
];

let stats = {};
let exam = [];
let index = 0;
let score = 0;

let selected = null;
let locked = false;
let time = 60;
let timer;

let wrongList = [];   // 🧠 NEW

function pick(){
  return data[Math.floor(Math.random()*data.length)];
}

/* START */
window.startExam = function(){
  exam = [];
  index = 0;
  score = 0;
  stats = {};
  wrongList = [];

  for(let i=0;i<20;i++) exam.push(pick());

  document.getElementById("card").style.display = "block";
  document.getElementById("result").innerHTML = "";
  document.getElementById("reviewBox").style.display = "none";

  show();
};

/* SHOW */
function show(){
  let q = exam[index];

  selected = null;
  locked = false;
  time = 60;

  document.getElementById("answer").innerHTML = "";
  document.getElementById("nextBtn").style.opacity = 0.5;
  document.getElementById("nextBtn").style.pointerEvents = "none";

  document.getElementById("cat").innerText = q.cat;
  document.getElementById("q").innerText = q.q;

  resetButtons();
  startTimer();
}

/* TIMER */
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱ " + time;

    if(time <= 0){
      clearInterval(timer);
      lock(false);
    }
  },1000);
}

/* SELECT */
window.selectAnswer = function(val){
  if(locked) return;

  selected = val;

  document.getElementById("yesBtn").classList.remove("selected");
  document.getElementById("noBtn").classList.remove("selected");

  if(val){
    document.getElementById("yesBtn").classList.add("selected");
  } else {
    document.getElementById("noBtn").classList.add("selected");
  }

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
};

/* LOCK */
function lock(force){
  if(locked) return;

  locked = true;
  clearInterval(timer);

  let q = exam[index];

  if(!stats[q.cat]) stats[q.cat] = {ok:0,bad:0};

  let val = selected;
  if(force !== undefined) val = force;

  if(val){
    stats[q.cat].ok++;
    score++;
  } else {
    stats[q.cat].bad++;

    // 🧠 SAVE WRONG QUESTION
    wrongList.push(q);
  }

  document.getElementById("answer").innerHTML =
    "📌 " + q.ans;

  document.getElementById("nextBtn").style.opacity = 1;
  document.getElementById("nextBtn").style.pointerEvents = "auto";
}

/* NEXT */
window.next = function(){
  if(!locked){
    lock(selected ?? false);
  }

  index++;

  if(index >= exam.length){
    finish();
    return;
  }

  show();
};

/* FINISH */
function finish(){
  clearInterval(timer);

  document.getElementById("card").style.display = "none";

  document.getElementById("result").innerHTML =
    "🎯 ქულა: " + score + "/20";

  showReview();
}

/* REVIEW */
function showReview(){
  if(wrongList.length === 0){
    document.getElementById("reviewBox").style.display = "block";
    document.getElementById("reviewList").innerHTML =
      "<p>🎉 შეცდომები არ გაქვს!</p>";
    return;
  }

  let html = "";
  wrongList.forEach((q,i)=>{
    html += `
      <div class="bad-item">
        <b>${i+1}.</b> ${q.q}<br>
        <span style="color:#ffcc00">📌 ${q.ans}</span>
      </div>
    `;
  });

  document.getElementById("reviewBox").style.display = "block";
  document.getElementById("reviewList").innerHTML = html;
}

function resetButtons(){
  document.getElementById("yesBtn").classList.remove("selected");
  document.getElementById("noBtn").classList.remove("selected");
}

</script>

</body>
</html>
